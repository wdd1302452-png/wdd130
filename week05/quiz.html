<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/quiz.css">
    <title>Quiz</title>
</head>
<body>
    <form id="html-quiz">
    <h1>HTML & CSS Knowledge Check</h1>

    <div class="form-item">
        <label for="q1">1. What does HTML stand for?</label>
        <input type="text" id="q1" name="q1" placeholder="Type answer here...">
    </div>

    <div class="form-item">
        <label for="q2">2. Explain the purpose of a CSS external stylesheet:</label>
        <textarea id="q2" name="q2" rows="4"></textarea>
    </div>

    <div class="form-item">
        <label for="q3">3. Which tag is used for the largest heading?</label>
        <select id="q3" name="q3">
            <option value="" selected disabled>Choose One ...</option>
            <option value="h6">&lt;h6&gt;</option>
            <option value="header">&lt;header&gt;</option>
            <option value="h1">&lt;h1&gt;</option>
        </select>
    </div>

    <div class="form-item">
        <label for="q4">4. How many types of heading tags (h1-h6) are there?</label>
        <input type="number" id="q4" name="q4">
    </div>

    <button type="submit">Submit Quiz</button>
</form>
</body>
</html>
